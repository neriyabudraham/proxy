server
{
    listen 80;
    listen 443 ssl http2;
    server_name proxy.botomat.co.il;
    
    ssl_certificate    /www/server/panel/vhost/cert/proxy.botomat.co.il/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/proxy.botomat.co.il/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    add_header Strict-Transport-Security "max-age=31536000";
    error_page 497 https://$host$request_uri;

    include /www/server/panel/vhost/nginx/well-known/proxy.botomat.co.il.conf;

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location ~ ^/(\.git|\.env) {
        return 404;
    }

    location ~ \.well-known {
        allow all;
    }

    access_log /www/wwwlogs/proxy.botomat.co.il.log;
    error_log /www/wwwlogs/proxy.botomat.co.il.error.log;
}
